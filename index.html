    <title>Bernice — Portfolio</title>
    <!-- Apply the saved desk-theme choice BEFORE first paint so the
         background never flashes the wrong mode. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("desk-theme");
          if (t === "light" || t === "dark")
            document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
